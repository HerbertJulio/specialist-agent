<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  
  <defs>
    <linearGradient id="bgs" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0B1929"/>
      <stop offset="50%" stop-color="#0F2340"/>
      <stop offset="100%" stop-color="#162D50"/>
    </linearGradient>
    <linearGradient id="g1s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="g2s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2B5EA7"/>
    </linearGradient>
    <linearGradient id="g3s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7FCF"/>
      <stop offset="100%" stop-color="#CD7F32"/>
    </linearGradient>
    <linearGradient id="shines" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glows" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#2B5EA7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadows" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bgs)"/>
  <rect width="1200" height="1200" fill="url(#glows)"/>

  
  <g><circle cx="96" cy="180" r="2.5" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1104" cy="144" r="1.6" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="60" cy="1020" r="2.2" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1140" cy="960" r="1.7" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="180" cy="540" r="1.6" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1056" cy="660" r="2.2" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="36" cy="660" r="1.7" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1164" cy="420" r="1.5" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="144" cy="900" r="2.3" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1020" cy="300" r="2.8" fill="#4A7FCF" opacity="0.15"/>
    <line x1="96" y1="180" x2="180" y2="540" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
    <line x1="1104" y1="144" x2="1056" y2="660" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
    <line x1="60" y1="1020" x2="144" y2="900" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
    <line x1="1140" y1="960" x2="1020" y2="300" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
  </g>

  <!-- Logo (large, centered) -->
  
  <g transform="translate(380, 250) scale(12)" filter="url(#shadows)">
    <path d="M16 26 L2 19 L16 12 L30 19 Z" fill="url(#g1s)" opacity="0.9"/>
    <path d="M16 21 L2 14 L16 7 L30 14 Z" fill="url(#g2s)" opacity="0.9"/>
    <path d="M16 16 L2 9 L16 2 L30 9 Z" fill="url(#g3s)" opacity="0.95"/>
    <path d="M16 2 L2 9 L16 16 Z" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Title -->
  <text x="600" y="700" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="84" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Specialist Agent</text>

  <!-- Tagline -->
  <text x="600" y="770" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#7BA3CC">Your AI development team</text>

  <!-- URL -->
  <text x="600" y="1120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#4A6A8A" letter-spacing="3">specialistagent.com.br</text>

  <!-- Bottom accent line -->
  <rect x="0" y="1196" width="1200" height="4" fill="url(#g3s)" opacity="0.6"/>
</svg>
