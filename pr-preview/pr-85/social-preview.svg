<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0B1929"/>
      <stop offset="50%" stop-color="#0F2340"/>
      <stop offset="100%" stop-color="#162D50"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2B5EA7"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7FCF"/>
      <stop offset="100%" stop-color="#CD7F32"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#2B5EA7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top shine -->
  <rect width="1200" height="1" fill="url(#shine)" y="0"/>

  
  <g><circle cx="96" cy="95" r="2.8" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1104" cy="76" r="2.4" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="60" cy="536" r="1.9" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1140" cy="504" r="2.4" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="180" cy="284" r="2.1" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1056" cy="347" r="1.7" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="36" cy="347" r="2.8" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1164" cy="221" r="1.9" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="144" cy="473" r="2.9" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1020" cy="158" r="2.7" fill="#4A7FCF" opacity="0.15"/>
    <line x1="96" y1="95" x2="180" y2="284" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
    <line x1="1104" y1="76" x2="1056" y2="347" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
    <line x1="60" y1="536" x2="144" y2="473" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
    <line x1="1140" y1="504" x2="1020" y2="158" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
  </g>

  
  <g transform="translate(505, 100) scale(5)" filter="url(#shadow)">
    <path d="M16 26 L2 19 L16 12 L30 19 Z" fill="url(#g1)" opacity="0.9"/>
    <path d="M16 21 L2 14 L16 7 L30 14 Z" fill="url(#g2)" opacity="0.9"/>
    <path d="M16 16 L2 9 L16 2 L30 9 Z" fill="url(#g3)" opacity="0.95"/>
    <path d="M16 2 L2 9 L16 16 Z" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Title -->
  <text x="600" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Specialist Agent</text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#7BA3CC">Your AI development team - any framework, any stack</text>

  <!-- Stats row -->
  <g>
    <rect x="362" y="454" width="120" height="32" rx="16" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="422" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#A8C8E8">36+ Agents</text>
    <rect x="494" y="454" width="110" height="32" rx="16" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="549" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#A8C8E8">32 Skills</text>
    <rect x="616" y="454" width="110" height="32" rx="16" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="671" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#A8C8E8">Lite Mode</text>
    <rect x="738" y="454" width="100" height="32" rx="16" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="788" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#A8C8E8">7 Packs</text>
  </g>

  <!-- Frameworks row -->
  <g>
    <rect x="255" y="505" width="90" height="30" rx="15" fill="#DD0031" opacity="0.2" stroke="#DD0031" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="300" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#DD0031">Angular</text>
    <rect x="355" y="505" width="90" height="30" rx="15" fill="#FF5D01" opacity="0.2" stroke="#FF5D01" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="400" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#FF5D01">Astro</text>
    <rect x="455" y="505" width="90" height="30" rx="15" fill="#CCCCCC" opacity="0.15" stroke="#CCCCCC" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="500" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#CCCCCC">Next.js</text>
    <rect x="555" y="505" width="90" height="30" rx="15" fill="#00DC82" opacity="0.2" stroke="#00DC82" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="600" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#00DC82">Nuxt</text>
    <rect x="655" y="505" width="90" height="30" rx="15" fill="#61DAFB" opacity="0.2" stroke="#61DAFB" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="700" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#61DAFB">React</text>
    <rect x="755" y="505" width="90" height="30" rx="15" fill="#FF3E00" opacity="0.2" stroke="#FF3E00" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="800" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#FF3E00">SvelteKit</text>
    <rect x="855" y="505" width="90" height="30" rx="15" fill="#42b883" opacity="0.2" stroke="#42b883" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="900" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#42b883">Vue 3</text>
  </g>

  <!-- URL -->
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4A6A8A" letter-spacing="2">specialistagent.com.br</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#g3)" opacity="0.6"/>
</svg>
