<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="hg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="hg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2B5EA7"/>
    </linearGradient>
    <linearGradient id="hg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7FCF"/>
      <stop offset="100%" stop-color="#CD7F32"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0A1628" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Orbit ring -->
  <ellipse cx="160" cy="175" rx="140" ry="42" fill="none" stroke="#4A7FCF" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 6"/>

  <!-- Main diamond logo -->
  <g transform="translate(76, 52) scale(5.25)" filter="url(#shadow)">
    <!-- Bottom layer -->
    <path d="M16 26 L2 19 L16 12 L30 19 Z" fill="url(#hg1)" opacity="0.9"/>
    <!-- Middle layer -->
    <path d="M16 21 L2 14 L16 7 L30 14 Z" fill="url(#hg2)" opacity="0.9"/>
    <!-- Top layer -->
    <path d="M16 16 L2 9 L16 2 L30 9 Z" fill="url(#hg3)" opacity="0.95"/>
    <!-- Highlight -->
    <path d="M16 2 L2 9 L16 16 Z" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Orbiting particles -->
  <circle r="3" fill="#4A7FCF" opacity="0.5">
    <animateMotion dur="12s" repeatCount="indefinite" path="M160,175 A140,42 0 1,1 159.9,175 Z"/>
  </circle>
  <circle r="2.5" fill="#CD7F32" opacity="0.45">
    <animateMotion dur="12s" repeatCount="indefinite" begin="4s" path="M160,175 A140,42 0 1,1 159.9,175 Z"/>
  </circle>
  <circle r="2" fill="#4A7FCF" opacity="0.35">
    <animateMotion dur="12s" repeatCount="indefinite" begin="8s" path="M160,175 A140,42 0 1,1 159.9,175 Z"/>
  </circle>
</svg>
